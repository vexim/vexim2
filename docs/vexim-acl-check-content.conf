  # Reject virus infested messages.
  #
  warn    message     = This message contains malware ($malware_name)
          malware     = *
          log_message = This message contains malware ($malware_name)

  # Reject messages with an "X-Spam-Flag: YES" header.
  #
  deny    message   = Sender openly considers message as spam (X-Spam-Flag header with a positive value was found).
          condition = ${if bool{$h_x-spam-flag:}{true}{false}}

  # Mails larger than 300 KB are accepted without spam-checking to save resources.
  #
  accept  condition = ${if >={$message_size}{300k}{yes}{no}}
          remove_header = X-Spam-Flag : X-Spam-Score : X-Spam-Status : X-Spam-Report

  # Conditional spam scanning based on SPAM_ENGINE macro
  #
  .ifdef SPAM_ENGINE_RSPAMD
      # RSPAMD configuration
      warn  spam = VEXIM_SA_USERNAME:true
            set acl_m_spam_action = $spam_action
            set acl_m_spam_score = $spam_score
            set acl_m_spam_bar = $spam_bar
            set acl_m_spam_report = $spam_report
            remove_header = X-Spam-Flag : X-Spam-Score : X-Spam-Status : X-Spam-Report
            log_message = Rspamd scan: action=$spam_action score=$spam_score

      warn  condition = ${if !eq{$acl_m_spam_action}{no action}}
            add_header = X-Spam-Flag: YES
            add_header = X-Spam-Score: $acl_m_spam_score ($acl_m_spam_bar)
            add_header = X-Spam-Report: $acl_m_spam_report
            add_header = X-Spam-Action: $acl_m_spam_action

      warn  condition = ${if eq{$acl_m_spam_action}{rewrite subject}}
            add_header = X-Spam-Subject: ***SPAM*** $h_subject
            remove_header = Subject
            add_header = Subject: ***SPAM*** $h_subject

      defer message = Please try again later
            condition = ${if match{$acl_m_spam_action}{greylist|soft reject}}

      deny  message = This message has been rejected as spam (score: $acl_m_spam_score)
            condition = ${if eq{$acl_m_spam_action}{reject}}
  .endif

  .ifdef SPAM_ENGINE_SPAMASSASSIN
      # SpamAssassin configuration
      warn  spam = spamd:/var/run/spamd.sock
            set acl_m_spam_score = $spam_score
            set acl_m_spam_bar = $spam_bar
            set acl_m_spam_report = $spam_report
            remove_header = X-Spam-Flag : X-Spam-Score : X-Spam-Status : X-Spam-Report

      warn  condition = ${if >{$spam_score_int}{50}}
            add_header = X-Spam-Flag: YES
            add_header = X-Spam-Score: $acl_m_spam_score ($acl_m_spam_bar)
            add_header = X-Spam-Report: $acl_m_spam_report

      deny  message = This message has been rejected as spam (score: $spam_score)
            condition = ${if >{$spam_score_int}{150}}
  .endif

  accept hosts          = 127.0.0.1:+relay_from_hosts
  accept authenticated  = *
